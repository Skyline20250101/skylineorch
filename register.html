<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyline 天際綫藝術學院 - 團員招募報名系統</title>
    <script src="https://unpkg.com/pinyin-pro"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --danger: #e74c3c; --info: #3498db; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f4f7f6; margin: 0; padding: 15px; color: var(--primary); }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        input[readonly] { background-color: #eee; cursor: not-allowed; }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; transition: 0.3s; margin-top: 10px; font-weight: bold; }
        button:hover { background: #34495e; }
        .btn-line { background: #00b900; margin-top: 8px; }
        .hidden { display: none; }
        #student-selector { background: #e8f4fd; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid var(--info); }
        .status-box { background: #fff5f5; border: 2px solid var(--danger); color: var(--danger); padding: 12px; border-radius: 8px; font-weight: bold; text-align: center; font-size: 18px; margin: 10px 0; }
        .info-msg { background: #fff3cd; color: #856404; padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 14px; display: none; }
        #qr-result { text-align: center; border-top: 2px dashed #ccc; margin-top: 20px; padding-top: 20px; }
        #qrcode { display: inline-block; margin: 20px 0; }
        #loading { text-align: center; padding: 20px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>招募報名系統</h2>

    <div id="step-1">
        <div class="form-group">
            <label>請輸入家長手機號碼</label>
            <input type="tel" id="search-phone" placeholder="例如：0912345678" maxlength="10">
            <button type="button" onclick="checkUser()">送出</button>
        </div>
        <div id="loading">讀取中，請稍候...</div>
    </div>

    <div id="student-selector" class="hidden">
        <label>偵測到舊資料，請選擇報名學員：</label>
        <select id="exist-student-list" onchange="autoFill(this.value)">
            <option value="">-- 請選擇 --</option>
            <option value="new">-- 新增學員 (另一位小孩) --</option>
        </select>
    </div>

    <form id="reg-form" class="hidden">
        <div class="form-group"><label>學生姓名 *</label><input type="text" id="stuName" required></div>
        <div class="form-group"><label>學生手機 (選填)</label><input type="tel" id="stuPhone"></div>
        <hr>
        <div class="form-group"><label>家長姓名 *</label><input type="text" id="parName" required></div>
        <div class="form-group"><label>家長手機</label><input type="text" id="parPhone" readonly></div>
        <div class="form-group"><label>就讀學校 *</label><input type="text" id="school" required></div>
        <div class="form-group">
            <label>就讀年級 *</label>
            <select id="grade" required>
                <option value="">-- 請選擇 --</option>
                <option value="小三">小三</option><option value="小四">小四</option><option value="小五">小五</option><option value="小六">小六</option>
                <option value="國一">國一</option><option value="國二">國二</option><option value="國三">國三</option>
                <option value="高一">高一</option><option value="高二">高二</option><option value="高三">高三</option>
            </select>
        </div>
        <div class="form-group"><label>報名樂器 *</label><input type="text" id="instrument" required placeholder="例如：小提琴"></div>
        <div class="form-group">
            <label>學習時間 *</label>
            <select id="studyTime" onchange="handleStudyTime(this.value)" required>
                <option value="">-- 請選擇 --</option>
                <option value="零基礎">零基礎</option>
                <option value="0~1年">0~1年</option><option value="1~2年">1~2年</option><option value="2~3年">2~3年</option>
                <option value="3~4年">3~4年</option><option value="4~5年">4~5年</option><option value="5~10年">5~10年</option>
                <option value="10年以上">10年以上</option>
            </select>
            <div id="zero-msg" class="info-msg">
                您好：我們將會為您安排學習課程，請靜待樂團老師電話聯繫，或使用官方LINE做詢問。
            </div>
        </div>
        <div class="form-group" id="song-group" style="display:none;">
            <label>自選曲目 *</label>
            <input type="text" id="song">
        </div>

        <div class="form-group">
            <label>通訊地址 *</label>
            <div style="display: flex; gap: 10px; margin-bottom: 8px;">
                <select id="city" onchange="updateDist(this.value)" required>
                    <option value="">-- 請選擇縣市 --</option>
                </select>
                <select id="dist" required>
                    <option value="">-- 請選擇區域 --</option>
                </select>
            </div>
            <input type="text" id="address" placeholder="詳細地址" required>
        </div>

        <div class="form-group">
            <label>報名日期場次 *</label>
            <select id="courseDate" required>
                <option value="">-- 請選擇日期場次 --</option>
            </select>
        </div>

        <div id="status-display-area" class="hidden">
            <label>目前錄取狀態</label>
            <div id="status-box" class="status-box">審核中</div>
        </div>

        <div class="form-group">
            <label>訊息來源</label>
            <select id="source">
                <option value="FB粉絲專頁">FB粉絲專頁</option>
                <option value="Instagram">Instagram</option>
                <option value="親友介紹">親友介紹</option>
                <option value="搜尋引擎">搜尋引擎</option>
            </select>
        </div>

        <button type="button" id="btn-submit" onclick="submitForm()">確認報名並產生憑證</button>
    </form>

    <div id="qr-result" class="hidden">
        <h3 style="color: var(--accent);">報名成功！</h3>
        <p>請截圖保存下方報到憑證：</p>
        <div id="qrcode"></div>
        <p id="display-qrcid" style="font-size: 12px; color: #999;"></p>
        <button onclick="downloadQR()" style="background:#7f8c8d;">下載憑證圖片</button>
        <button class="btn-line" onclick="contactLine()">開啟官方 LINE 回報</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyg3uS15mMhbY87YnyMuM77ZateljVNpH3555EUYUv9iKInO35EMrina3wzir-AZMh5/exec";
    const LINE_ID = "@597suzyh"; // 您的官方 LINE ID
    let userData = [];
    const twData = {"台北市":["中正區","大同區","中山區","松山區","大安區","萬華區","信義區","士林區","北投區","內湖區","南港區","文山區"],"新北市":["板橋區","三重區","中和區","永和區","新莊區","新店區","樹林區","鶯歌區","三峽區","淡水區","汐止區","瑞芳區","土城區","蘆洲區","五股區","泰山區","林口區","深坑區","石碇區","坪林區","三芝區","石門區","八里區","平溪區","雙溪區","貢寮區","金山區","萬里區","烏來區"],"桃園市":["桃園區","中壢區","大溪區","楊梅區","蘆竹區","大園區","龜山區","八德區","龍潭區","平鎮區","新屋區","觀音區","復興區"],"台中市":["中區","東區","南區","西區","北區","北屯區","西屯區","南屯區","太平區","大里區","霧峰區","烏日區","豐原區","後里區","石岡區","東勢區","和平區","新社區","潭子區","大雅區","神岡區","大肚區","沙鹿區","龍井區","梧棲區","清水區","大甲區","外埔區","大安區"],"台南市":["中西區","東區","南區","北區","安平區","安南區","永康區","歸仁區","新化區","左鎮區","玉井區","楠西區","南化區","仁德區","關廟區","龍崎區","官田區","麻豆區","佳里區","西港區","七股區","將軍區","學甲區","北門區","新營區","後壁區","白河區","東山區","六甲區","下營區","柳營區","鹽水區","善化區","大內區","山上區","新市區","安定區"],"高雄市":["新興區","前金區","苓雅區","鹽埕區","鼓山區","旗津區","前鎮區","三民區","楠梓區","小港區","左營區","仁武區","大社區","岡山區","路竹區","阿蓮區","田寮區","燕巢區","橋頭區","梓官區","彌陀區","永安區","湖內區","鳳山區","大寮區","林園區","鳥松區","大樹區","旗山區","美濃區","六龜區","內門區","杉林區","甲仙區","桃源區","那瑪夏區","茂林區","茄萣區"]};

    window.onload = () => {
        const citySelect = document.getElementById('city');
        Object.keys(twData).forEach(c => citySelect.add(new Option(c, c)));
    };

    function updateDist(city) {
        const distSelect = document.getElementById('dist');
        distSelect.innerHTML = '<option value="">-- 請選擇區域 --</option>';
        if(!city) return;
        twData[city].forEach(d => distSelect.add(new Option(d, d)));
    }

    function checkUser() {
        const phone = document.getElementById('search-phone').value.trim();
        if (phone.length < 10) return alert("請輸入 10 碼家長手機號碼");
        
        document.getElementById('loading').style.display = 'block';
        
        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'checkUser', parentPhone: phone })
        }).then(res => res.json()).then(res => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('reg-form').classList.remove('hidden');
            document.getElementById('parPhone').value = phone;

            // 動態抓取日期欄位 (8位數字)
            if (res.headers) {
                const dateSelect = document.getElementById('courseDate');
                dateSelect.innerHTML = '<option value="">-- 請選擇日期場次 --</option>';
                res.headers.forEach(h => {
                    if (/^\d{8}$/.test(h.toString())) {
                        dateSelect.add(new Option(h, h));
                    }
                });
            }

            if (res.exists) {
                userData = res.students;
                document.getElementById('student-selector').classList.remove('hidden');
                const list = document.getElementById('exist-student-list');
                userData.forEach((s, i) => list.add(new Option(s.stuName, i)));
            }
        });
    }

    function autoFill(val) {
        const btn = document.getElementById('btn-submit');
        const statusArea = document.getElementById('status-display-area');
        const qrResult = document.getElementById('qr-result');

        if (val === "" || val === "new") {
            document.getElementById('reg-form').reset();
            document.getElementById('parPhone').value = document.getElementById('search-phone').value;
            btn.classList.remove('hidden');
            statusArea.classList.add('hidden');
            qrResult.classList.add('hidden');
            return;
        }

        const s = userData[val];
        document.getElementById('stuName').value = s.stuName;
        document.getElementById('stuPhone').value = s.stuPhone || "";
        document.getElementById('parName').value = s.parName;
        document.getElementById('school').value = s.school;
        document.getElementById('grade').value = s.grade;
        document.getElementById('instrument').value = s.instrument;
        document.getElementById('studyTime').value = s.studyTime;
        document.getElementById('song').value = s.song || "";
        document.getElementById('city').value = s.city;
        updateDist(s.city);
        document.getElementById('dist').value = s.dist;
        document.getElementById('address').value = s.address;
        document.getElementById('source').value = s.source;
        
        handleStudyTime(s.studyTime);

        // 顯示錄取狀態
        statusArea.classList.remove('hidden');
        document.getElementById('status-box').innerText = s.adStatus || "審核中";

        // 舊生若已有 QRC ID 則直接顯示並隱藏送出按鈕
        if (s.qrcId) {
            btn.classList.add('hidden');
            showQRCode(s.qrcId);
        } else {
            btn.classList.remove('hidden');
            qrResult.classList.add('hidden');
        }
    }

    function handleStudyTime(val) {
        const songGroup = document.getElementById('song-group');
        const zeroMsg = document.getElementById('zero-msg');
        const songInput = document.getElementById('song');
        if (val === '零基礎') {
            songGroup.style.display = 'none';
            zeroMsg.style.display = 'block';
            songInput.required = false;
        } else {
            songGroup.style.display = 'block';
            zeroMsg.style.display = 'none';
            songInput.required = true;
        }
    }

    function submitForm() {
        const form = document.getElementById('reg-form');
        if (!form.checkValidity()) return form.reportValidity();
        
        const btn = document.getElementById('btn-submit');
        btn.disabled = true;
        btn.innerText = "處理中...";

        const name = document.getElementById('stuName').value;
        const date = document.getElementById('courseDate').value;
        const pinyinName = pinyinPro.pinyin(name, { toneType: 'none', type: 'array' }).join('');
        const qrcId = `${pinyinName}-${date}-${Math.floor(100 + Math.random()*899)}`;

        const payload = {
            action: 'register',
            stuName: name,
            stuPhone: document.getElementById('stuPhone').value,
            parName: document.getElementById('parName').value,
            parentPhone: document.getElementById('parPhone').value,
            school: document.getElementById('school').value,
            grade: document.getElementById('grade').value,
            instrument: document.getElementById('instrument').value,
            studyTime: document.getElementById('studyTime').value,
            song: document.getElementById('song').value,
            city: document.getElementById('city').value,
            dist: document.getElementById('dist').value,
            address: document.getElementById('address').value,
            source: document.getElementById('source').value,
            courseDate: date,
            qrcId: qrcId
        };

        fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
        .then(res => res.json()).then(res => {
            if (res.result === 'success') {
                btn.classList.add('hidden');
                document.getElementById('status-display-area').classList.remove('hidden');
                showQRCode(qrcId);
                alert("報名成功！");
            } else {
                alert("錯誤：" + res.message);
                btn.disabled = false;
                btn.innerText = "確認報名並產生憑證";
            }
        });
    }

    function showQRCode(qrcId) {
        const qrDiv = document.getElementById("qrcode");
        qrDiv.innerHTML = ""; 
        document.getElementById('display-qrcid').innerText = "憑證編號：" + qrcId;
        document.getElementById('qr-result').classList.remove('hidden');
        new QRCode(qrDiv, { text: qrcId, width: 200, height: 200, correctLevel : QRCode.CorrectLevel.H });
    }

    function downloadQR() {
        const canvas = document.querySelector('#qrcode canvas');
        const link = document.createElement('a');
        link.href = canvas.toDataURL("image/png");
        link.download = `Skyline憑證_${document.getElementById('stuName').value}.png`;
        link.click();
    }

    function contactLine() {
        const name = document.getElementById('stuName').value;
        const date = document.getElementById('courseDate').value;
        const msg = encodeURIComponent(`您好，我是 ${name} 的家長，已完成 ${date} 招募報名，請協助確認。`);
        window.location.href = `https://line.me/R/oaMessage/${LINE_ID}/?${msg}`; 
    }
</script>
</body>
</html>
