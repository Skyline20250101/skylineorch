<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyline 報到管理系統 (即時名單版)</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --warn: #f39c12; --danger: #e74c3c; --blue: #3498db; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f0f3f5; margin: 0; padding: 10px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); margin: 0 0 15px 0; font-size: 20px; }
        
        .config-box { margin-bottom: 15px; padding: 15px; background: #f8f9fa; border-radius: 8px; display: flex; align-items: center; gap: 10px; }
        select { flex: 1; padding: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #ddd; }
        
        #reader { width: 100%; border-radius: 8px; overflow: hidden; border: 2px solid #ddd; margin-bottom: 15px; }
        
        /* 統計與清單樣式 */
        .stats { font-weight: bold; margin-bottom: 10px; color: var(--blue); text-align: left; }
        .list-container { max-height: 400px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #eee; position: sticky; top: 0; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #f0f0f0; }
        
        /* 狀態顏色 */
        .status-checkin { color: white; background: var(--success); padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .status-wait { color: #777; background: #eee; padding: 2px 6px; border-radius: 4px; }
        .row-checked { background-color: #eafff0 !important; }

        #result-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); color: white; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .overlay-card { background: white; color: #333; padding: 30px; border-radius: 15px; text-align: center; width: 80%; max-width: 300px; }
        .btn-close { margin-top: 20px; padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Skyline 報到管理系統</h2>
    
<div class="config-box">
    <label>場次：</label>
    <select id="courseDate" onchange="loadList()">
        <option value="">正在讀取場次...</option>
    </select>
</div>

    <div id="reader"></div>

    <div class="stats" id="stats-info">載入名單中...</div>
    
    <div class="list-container">
        <table>
            <thead>
                <tr>
                    <th>學員姓名</th>
                    <th>家長姓名 / 手機</th>
                    <th>狀態</th>
                </tr>
            </thead>
            <tbody id="student-list-body">
                </tbody>
        </table>
    </div>
</div>

<div id="result-overlay">
    <div class="overlay-card" id="overlay-content">
        <div id="res-icon" style="font-size: 50px;"></div>
        <div id="res-msg" style="font-size: 20px; font-weight: bold; margin: 10px 0;"></div>
        <div id="res-detail" style="color: #666; margin-bottom: 10px;"></div>
        <div id="res-ad" style="font-weight: bold; color: var(--danger);"></div>
        <button class="btn-close" onclick="closeOverlay()">繼續掃描</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyg3uS15mMhbY87YnyMuM77ZateljVNpH3555EUYUv9iKInO35EMrina3wzir-AZMh5/exec";
    let html5QrCode;
    let allStudents = [];

// 這是新的，直接貼上取代上面那段
window.onload = () => {
    // 1. 自動抓取日期欄位填入選單
    fetch(`${GAS_URL}?action=getDates`)
    .then(res => res.json())
    .then(res => {
        if(res.result === 'success') {
            const select = document.getElementById('courseDate');
            select.innerHTML = ""; // 清空舊的
            res.dates.forEach(d => {
                const opt = new Option(d, d);
                select.add(opt);
            });
            loadList(); // 日期抓完後再抓名單
        }
    });
    initScanner();
};

    function initScanner() {
        html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 15, qrbox: { width: 200, height: 200 } };
        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
    }

    function onScanSuccess(decodedText) {
        html5QrCode.pause();
        processCheckIn(decodedText);
    }

    // 抓取雲端名單
// 修改 Scan.html 裡的 loadList 函數
function loadList() {
    const date = document.getElementById('courseDate').value;
    document.getElementById('stats-info').innerText = "正在更新名單...";
    
    // 加上 timestamp 避免瀏覽器快取舊資料
    const fetchUrl = `${GAS_URL}?action=getList&courseDate=${date}&t=${new Date().getTime()}`;
    
    fetch(fetchUrl, { method: 'GET' })
    .then(res => {
        if (!res.ok) throw new Error('網路回應不正確');
        return res.json();
    })
    .then(res => {
        if (res.result === 'success') {
            allStudents = res.data;
            renderTable();
        } else {
            document.getElementById('stats-info').innerText = "載入失敗：" + res.message;
        }
    })
    .catch(err => {
        console.error(err);
        document.getElementById('stats-info').innerText = "連線錯誤，請檢查部署 ID";
    });
}

    // 渲染表格
// 渲染表格 (增加點擊事件)
function renderTable() {
    const body = document.getElementById('student-list-body');
    body.innerHTML = "";
    let checkedCount = 0;

    allStudents.forEach((s, index) => { // 取得 index
        const isChecked = s.status_checkin === "已報到";
        if (isChecked) checkedCount++;
        
        const row = document.createElement('tr');
        if (isChecked) row.className = "row-checked";
        
        // 在姓名 td 加上 onclick
        row.innerHTML = `
            <td onclick="showStudentDetail(${index})" style="cursor:pointer;">
                <b>${s.name}</b><br><small>${s.instrument}</small>
            </td>
            <td>${s.parName}<br><small>${s.parPhone}</small></td>
            <td><span class="${isChecked ? 'status-checkin' : 'status-wait'}">${s.status_checkin || '未報到'}</span></td>
        `;
        body.appendChild(row);
    });

    // 更新統計資訊與備註
    document.getElementById('stats-info').innerHTML = 
        `📊 今日報到進度：${checkedCount} / ${allStudents.length}<br>` +
        `<small style="color:#666;">備註：點選學員名稱可顯示詳細資料</small>`;
}

    // 處理報到動作
    function processCheckIn(qrcId) {
        const date = document.getElementById('courseDate').value;
        const overlay = document.getElementById('result-overlay');
        
        overlay.style.display = "flex";
        document.getElementById('res-msg').innerText = "驗證中...";
        document.getElementById('res-icon').innerText = "⏳";

        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'checkIn', qrcId: qrcId, courseDate: date })
        })
        .then(res => res.json())
        .then(res => {
            if (res.result === 'success') {
                document.getElementById('res-icon').innerText = "✅";
                document.getElementById('res-msg').innerText = "報到成功";
                document.getElementById('res-detail').innerText = `${res.name} (${res.instrument})`;
                document.getElementById('res-ad').innerText = "錄取狀態：" + res.adStatus;
                playTone(true);
                loadList(); // 報到成功後立即刷新清單
            } else {
                document.getElementById('res-icon').innerText = "❌";
                document.getElementById('res-msg').innerText = res.result === 'already' ? "重複報到" : "驗證失敗";
                document.getElementById('res-detail').innerText = res.message || "";
                playTone(false);
            }
        });
    }

    function closeOverlay() {
        document.getElementById('result-overlay').style.display = "none";
        html5QrCode.resume();
    }

    function playTone(isSuccess) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(isSuccess ? 880 : 220, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }

let currentEditIndex = null;

    // 顯示詳細資料彈窗
    function showDetail(index) {
        currentEditIndex = index;
        const s = allStudents[index];
        const list = document.getElementById('detail-list');
        
        // 依照你的要求：排除 QRC ID 與 報名場次 的所有欄位
        const fields = [
            ["學生姓名", s.name], 
            ["學生手機", s.phone], 
            ["家長姓名", s.parName], 
            ["家長手機", s.parPhone], 
            ["就讀學校", s.school], 
            ["年級", s.grade],
            ["報名樂器", s.instrument], 
            ["學習時間", s.studyTime], 
            ["自選曲目", s.song],
            ["詳細地址", (s.city || '') + (s.dist || '') + (s.address || '')], 
            ["訊息來源", s.source]
        ];

        // 動態生成列表內容
        list.innerHTML = fields.map(f => `<div><b>${f[0]}：</b>${f[1] || '無'}</div>`).join('');
        
        // 錄取狀態下拉選單預設值 (對應第 13 欄)
        document.getElementById('modal-adStatus').value = s.adStatus || "";
        
        // 顯示 Overlay
        document.getElementById('detail-overlay').style.display = "flex";

        // 綁定儲存按鈕
        document.getElementById('save-status-btn').onclick = () => updateStatus(index);
    }

    function closeDetail() {
        document.getElementById('detail-overlay').style.display = "none";
    }

    function updateStatus(index) {
        const s = allStudents[index];
        const newStatus = document.getElementById('modal-adStatus').value;
        const btn = document.getElementById('save-status-btn');
        
        btn.innerText = "儲存中...";
        btn.disabled = true;

        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'updateAdStatus',
                stuName: s.name,
                parentPhone: s.parPhone,
                newStatus: newStatus
            })
        })
        .then(res => res.json())
        .then(res => {
            if (res.result === 'success') {
                alert("錄取狀態已更新！");
                allStudents[index].adStatus = newStatus; // 同步本地資料
                closeDetail();
                loadList(); // 重新整理名單以確保資料一致
            } else {
                alert("更新失敗：" + res.message);
            }
            btn.innerText = "儲存更新";
            btn.disabled = false;
        });
    }
    
</script>

<div id="detail-overlay" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 200;">
    <div style="background: white; padding: 20px; border-radius: 12px; width: 85%; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
        <h3 style="margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px;">學員詳細資料</h3>
        <div id="detail-list" style="max-height: 300px; overflow-y: auto; font-size: 14px; line-height: 1.6; text-align: left;"></div>
        <hr>
        <div style="text-align: left; margin-bottom: 15px;">
            <label><b>錄取狀態：</b></label>
            <select id="modal-adStatus" style="width: 100%; padding: 8px; margin-top: 5px;">
                <option value="">請選擇</option>
                <option value="已錄取">已錄取</option>
                <option value="未錄取">未錄取</option>
            </select>
        </div>
        <div style="display: flex; gap: 10px;">
            <button onclick="closeDetail()" style="flex: 1; padding: 10px; background: #95a5a6; color: white; border: none; border-radius: 5px;">關閉</button>
            <button id="save-status-btn" style="flex: 1; padding: 10px; background: #27ae60; color: white; border: none; border-radius: 5px;">儲存更新</button>
        </div>
    </div>
</div>
    
</body>
</html>
